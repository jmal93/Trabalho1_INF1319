services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: encurtador
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d encurtador" ]
      interval: 5s
      timeout: 5s
      retries: 10

  web-encurtador:
    build: ./Encurtador
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/encurtador
    depends_on:
      db:
        condition: service_healthy

  web-redirecionador:
    build: ./Redirecionador
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/encurtador
    depends_on:
      db:
        condition: service_healthy
