Cria um novo link encurtado
---
parameters:
  - name: body
    in: body
    required: true
    schema:
      type: object
      properties:
        url:
          type: string
          example: "https://google.com"
        owner-id:
          type: string
          example: "roger"
responses:
  201:
    description: Link criado com sucesso
  400:
    description: Dados inválidos
