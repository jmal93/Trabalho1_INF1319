Lista URLs de um usuário específico
---
parameters:
  - name: owner_id
    in: path
    type: string
    required: true
    description: ID do usuário dono das URLs
  - name: page
    in: query
    type: integer
    required: false
    default: 1
    description: Número da página
  - name: per_page
    in: query
    type: integer
    required: false
    default: 10
    description: Quantidade de itens por página
responses:
  200:
    description: Lista de URLs do usuário com paginação
    schema:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              original_url:
                type: string
              short_code:
                type: string
              short_url:
                type: string
              owner_id:
                type: string
              created_at:
                type: string
              hits:
                type: integer
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        pages:
          type: integer
  404:
    description: Nenhuma URL encontrada